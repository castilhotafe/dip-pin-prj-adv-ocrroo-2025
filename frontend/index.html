<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR Video Learning Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>OCR Video Learning Assistant</h1>
    <p>Navigate through a coding video using accessible controls.</p>
</header>

<main>

    <section>
        <h2>Video Player</h2>

        <video id="coding-video" controls>
            <source src="../resources/oop.mp4" type="video/mp4">
            Your browser does not support video playback.
        </video>
    </section>

    <section>
        <h2>Video Navigation</h2>

        <p id="current-position">
            Current Position: 00:00
        </p>

        <p id="status-message">
            Status: Ready.
        </p>
    </section>

</main>

<script src="app.js"></script>

</body>
</html>
