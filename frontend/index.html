<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODE HIGH-VIS</title>
    <link rel="stylesheet" href="/frontend/style.css">
</head>
<body>

<header>
    <h1>CODE HIGH-VIS</h1>
    <p>Navigate through a coding video using accessible controls.</p>
</header>

<main>

    <section aria-labelledby="video-player-title">
        <h2 id="video-player-title">Video Player</h2>

        <video
                id="coding-video"
                controls
                aria-label="Coding video player">
            <source src="/resources/oop.mp4" type="video/mp4">
            Your browser does not support video playback.
        </video>
    </section>

    <section aria-labelledby="video-navigation-title">
        <h2 id="video-navigation-title">Video Navigation</h2>

        <p id="current-position">
            Current Position: 00:00
        </p>

        <p id="status-message">
            Status: Ready.
        </p>
        <button
                id="read-code-button"
                type="button"
                aria-label="Read code from the current video position">
            Read Code From Video
        </button>

        <section aria-labelledby="code-output-title">
            <div class="code-output-header">

                <h2 id="code-output-title">Code From Video</h2>

                <button

                        id="contrast-toggle"

                        type="button"

                        aria-pressed="false">

                    High Contrast Mode OFF

                </button>

            </div>

            <pre
                    id="ocr-result"
                    aria-live="polite"
                    tabindex="0">
Code extracted from the video will appear here.
    </pre>
        </section>
    </section>

</main>

<script src="/frontend/app.js"></script>

</body>
</html>
